<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    span {
      cursor: pointer;
      color: blue;
      text-decoration: underline
    }
  </style>

</head>

<body>
  URL
  <input type="text" value="https://test.com/" id="URL" size="25func"><br>
  <br>
  アンカーリンクで遷移
  <a href="https://test.com/">Home</a>
  <a href="https://test.com/page1">Page1</a>
  <a href="https://test.com/page1/2">Page1-2</a>
  <a href="https://test.com/page1/2/1234">ID1234</a>
  <a href="https://test.com/page1/2/5678">ID5678</a><br>
  <br>

  <div id="Content"></div>

<script>

class Router {
  static ANY_ID = {}

  constructor(route) {
    this.route = route;

    this.run();
    this.event();
  }

  event() {
    document.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', (e) => {
        this.onClick(e, a);
      })
    });
  }

  onClick(e, a) {
    e.preventDefault();
    //history.pushState(null, null, a.href);
    document.getElementById('URL').value = a.href;
    this.run();
  }

  run() {
    //const URL = location.pathname;
    let URL = document.getElementById('URL').value.replace('https://test.com', '');

    if (URL === '/') {
      this.route.render();
      return;
    }

    URL = URL.replace(/\/$/, '').slice(1).split('/');
    const path = this.parseURL(URL);
    
    path();
  }

  parseURL(URL) {
    let route = this.route;
    
    for (let i = 0; i < URL.length; i++) {
      if (route[URL[i]] !== undefined) {
        route = route[URL[i]];
      } else if (route.ANY !== undefined) {
        route = route.ANY;
        Router.ANY_ID[route.ANY_ID] = URL[i];
      } else {
        return this.notFound;
      }
    }

    return route.render;
  }

  notFound() {
    alert('404');
  }
};


const routes = {
  render: () => Content.innerHTML = 
  `<h2>ホーム</h2>
    <img src="https://1.bp.blogspot.com/-RE_LtIhPBps/VCOJt4M6ZEI/AAAAAAAAm1k/WGvtkInZP9s/s800/house_reform.png" height="200px">`
};

routes.page1 = {
  render: () => Content.innerHTML = `<h2>ページ 1</h2>
    <img src="https://1.bp.blogspot.com/-DRHWD7Jr4u8/X9WHA3lN4eI/AAAAAAABczA/JsX-EHcxM3so9Qtcy9G0K3CNGchbBIc5wCNcBGAsYHQ/s400/food_ramen_woman.png" height="200px">`
};

routes.page1['2'] = {
  render: () => Content.innerHTML = `<h2>ページ 1-2</h2>
    <img src="https://1.bp.blogspot.com/-HPG_x7XPky8/X-FctLTLkKI/AAAAAAABdEE/xs4T8m0FiBAFptXHGQhQ2c9ZmVWtaeQSgCNcBGAsYHQ/s1028/onepiece05_sanji.png" height="200px">`
};

routes.page1['2'].ANY = {
  render: page2,
  ANY_ID: 'page_id',
};


function page2() {
  if (Router.ANY_ID['page_id'] === '1234') {
    Content.innerHTML = `<h2>ID ${Router.ANY_ID['page_id']}</h2>
    <img src="https://1.bp.blogspot.com/-ZOg0qAG4ewU/Xub_uw6q0DI/AAAAAAABZio/MshyuVBpHUgaOKJtL47LmVkCf5Vge6MQQCNcBGAsYHQ/s1600/pose_pien_uruuru_woman.png" height="200px">`;
  } else {
    Content.innerHTML = `<h2>ID ${Router.ANY_ID['page_id']}</h2>
    <img src="https://1.bp.blogspot.com/-jlZlCg-8FAM/Xub_u8HTD1I/AAAAAAABZis/ZhUI05AZBEQpVinedZ6Xy-eIucmNuY2SQCNcBGAsYHQ/s1600/pose_pien_uruuru_man.png" height="200px">`;
  }
}


(r => { const R = new Router(r) })(routes);











</script>
</body>

</html>
